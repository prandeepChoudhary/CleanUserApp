Your workflow is publishing the whole solution, because you are running:

dotnet publish -c Release -o ...
Without specifying a .csproj, it will pick the first web project or publish multiple stuff unpredictably.

✅ To deploy API only, change build and publish steps to explicitly target API csproj.

