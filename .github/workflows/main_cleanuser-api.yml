jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore CleanUserApp.API/CleanUserApp.API.csproj

      - name: Build API
        run: dotnet build CleanUserApp.API/CleanUserApp.API.csproj --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish CleanUserApp.API/CleanUserApp.API.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp --no-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
