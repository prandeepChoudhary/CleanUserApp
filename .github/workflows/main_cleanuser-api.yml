using CleanUserApp.Application.DTOs;
using CleanUserApp.Application.Interfaces;
using CleanUserApp.Application.Services;
using CleanUserApp.Domain.Entities;

namespace CleanUserApp.Application.Implementations
{
    public class UserService : IUserService
    {
        private readonly IUserRepository _repo;

        public UserService(IUserRepository repo)
        {
            _repo = repo;
        }

        public async Task<List<UserDto>> GetAllUsersAsync()
        {
            var users = await _repo.GetAllAsync();

            return users.Select(u => new UserDto
            {
                Id = u.Id,
                FirstName = u.FirstName,
                LastName = u.LastName,
                Age = u.Age
            }).ToList();
        }

        public async Task<int> CreateUserAsync(CreateUserDto user)
        {
            var entity = new User
            {
                FirstName = user.FirstName,
                LastName = user.LastName,
                Age = user.Age
            };

            return await _repo.AddAsync(entity);
        }
    }
}
